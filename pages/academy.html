<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الأكاديمية العسكرية</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="page-nav">
    <a href="../index.html">رجوع</a>
    <span>الأكاديمية العسكرية</span>
  </nav>

  <main class="app-shell">
    <section class="hero-panel" aria-label="الأكاديمية العسكرية">
      <div class="hero-content">
        <p class="eyebrow">التدريب</p>
        <h1>الأكاديمية العسكرية</h1>
        <p class="hero-copy">مركز الدورات والتدريب العسكري ضمن تصميم موحد مع بقية النظام.</p>
      </div>
      <div class="stats-grid">
        <div><strong>3</strong><span>مسارات</span></div>
        <div><strong>تدريب</strong><span>تصنيف</span></div>
        <div><strong>ATH</strong><span>أكاديمية</span></div>
      </div>
    </section>

    <section class="cards-grid" aria-label="مسارات الأكاديمية">
      <button class="action-card" type="button">
        <span class="module-kicker">أساسي</span>
        <strong>الدورات الأساسية</strong>
        <small>تنظيم الدورات المطلوبة للأفراد الجدد.</small>
      </button>
      <button class="action-card" type="button">
        <span class="module-kicker">متقدم</span>
        <strong>التدريب المتقدم</strong>
        <small>مسارات تدريبية للمهارات الميدانية المتقدمة.</small>
      </button>
      <button class="action-card" type="button">
        <span class="module-kicker">اعتماد</span>
        <strong>سجلات الاعتماد</strong>
        <small>متابعة اعتماد الدورات والنتائج.</small>
      </button>
    </section>
  </main>
</body>
</html>
