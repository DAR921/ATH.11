      // For correctness, reuse the full arrays from the main app.js by loading them programmatically.
    // Since we cannot reliably import app.js (it expects other elements), we'll fetch it and eval only the constants.
    (async function loadLists() {
      try {
        const res = await fetch('js/app.js');
        const text = await res.text();
        // extract constants definitions for ranks, penalties, charges
        const ranksMatch = text.match(/const ranks = \[([\s\S]*?)\];/m);
        const penaltiesMatch = text.match(/const penalties = \{([\s\S]*?)\};/m);
        const chargesMatch = text.match(/const charges = \{([\s\S]*?)\};/m);
        if (ranksMatch && penaltiesMatch && chargesMatch) {
          // eslint-disable-next-line no-eval
          eval('ranks = [' + ranksMatch[1] + ']');
          // eslint-disable-next-line no-eval
          eval('penalties = {' + penaltiesMatch[1] + '}');
          // eslint-disable-next-line no-eval
          eval('charges = {' + chargesMatch[1] + '}');
        }
      } catch (e) {
        // fallback: use the compressed placeholders above (these will be ignored if replaced)
        console.warn('Could not load full lists from app.js, using embedded data.');
      }

      // initialize selects
      const el = {
        rank: document.getElementById('rank'),
        issuer: document.getElementById('issuer'),
        gradeFilter: document.getElementById('gradeFilter'),
        chargeSelect: document.getElementById('chargeSelect'),
        manualCharge: document.getElementById('manualCharge'),
        manualChargeField: document.getElementById('manualChargeField'),
        manualVerdict: document.getElementById('manualVerdict'),
        manualVerdictField: document.getElementById('manualVerdictField'),
        verdict: document.getElementById('verdict')
      };

      function fillSelects() {
        el.rank.innerHTML = '<option value="">اختر الرتبة...</option>';
        ranks.forEach((r, i) => el.rank.add(new Option(r, String(i))));

        el.gradeFilter.innerHTML = '<option value="all">كل الدرجات</option>';
        Object.keys(charges).forEach((grade) => el.gradeFilter.add(new Option(grade, grade)));
        renderCharges();
      }

      function renderCharges() {
        const selectedGrade = el.gradeFilter.value || 'all';
        const currentValue = el.chargeSelect.value;
        el.chargeSelect.innerHTML = '<option value="">اختر التهمة...</option>';

        const manualOption = new Option('يدوي', 'manual|manual');
        el.chargeSelect.appendChild(manualOption);

        Object.entries(charges).forEach(([grade, list]) => {
          if (selectedGrade !== 'all' && selectedGrade !== grade) return;
          const group = document.createElement('optgroup');
          group.label = grade;
          list.forEach((charge) => {
            const option = new Option(charge, `${grade}|${charge}`);
            group.appendChild(option);
          });
          el.chargeSelect.appendChild(group);
        });

        if ([...el.chargeSelect.options].some((o) => o.value === currentValue)) el.chargeSelect.value = currentValue;
      }

      function isManualCharge() { return el.chargeSelect.value === 'manual|manual'; }

      function getSelectedCharge() {
        const value = el.chargeSelect.value;
        if (!value) return { grade: '', charge: '' };
        if (value === 'manual|manual') return { grade: 'يدوي', charge: el.manualCharge.value.trim() };
        const [grade, ...parts] = value.split('|');
        return { grade, charge: parts.join('|') };
      }

      function calculateVerdict() {
        const rankIndex = el.rank.value;
        const manual = isManualCharge();
        el.manualChargeField.style.display = manual ? 'grid' : 'none';
        el.manualVerdictField.style.display = manual ? 'grid' : 'none';
        el.verdict.readOnly = !manual;
        if (manual) {
          el.verdict.value = el.manualVerdict.value.trim();
          return;
        }
        el.manualCharge.value = '';
        el.manualVerdict.value = '';
        const { grade } = getSelectedCharge();
        el.verdict.value = rankIndex !== '' && grade ? (penalties[grade] && penalties[grade][Number(rankIndex)]) || 'غير محدد في ملف الأحكام' : '';
      }

      function buildText() {
        const { charge } = getSelectedCharge();
        const num = document.getElementById('num').value;
        const file = document.getElementById('fileNum').value;
        const soldierVal = document.getElementById('soldier').value;
        const verdict = el.verdict.value;
        const issuerSelect = document.getElementById('issuer');
        const selectedOption = issuerSelect.options[issuerSelect.selectedIndex];
        const issuerID = selectedOption.getAttribute('data-id') || '';
        const issuerMention = issuerID ? `<@&${issuerID}>` : '';

        return `**﷽**\n\n` +
          `**برقية رقم  :${num}**\n\n` +
          `**  قرار حكم صادر من :**\n\n` +
          `${issuerMention} \n\n` +
          `**وبناء على ماورد في ملف التحقيق ${file}**\n\n` +
          `** على العسكري المذكور أدناه :**\n\n` +
          `<@${soldierVal}> \n\n` +
          ` ** وبعد ماتم مناقشته مع المجلس العسكري والقُضاه فقد تقرر على المُدين اعلاه بالحكم**\n \n` +
          `**الحكم :**\n\n` +
          `** \`${verdict} - تسلم الى احد اعضاء مجلس القضاء   \`  **\n \n` +
          `**السبب :**\n\n` +
          `** \`${charge}   \`  **\n\n` +
          `**ترسل نسخة لـ**<@&1404535917724827758>  \n\n` +
          `**رئاسة الشرطة العسكرية ** \n\n` +
          `<@725791545701433363> \n\n` +
          `<@&1404535924469010482>  \n\n` +
          `<@1139736525752516659> \n\n` +
          `<@&1404535924280529059>  \n\n` +
          `<@852978992436740106>`;
      }

      const copyBtn = document.getElementById('copyBtn');
      const preview = document.getElementById('preview');
      const toast = document.getElementById('toast');

      function isReady() {
        const required = [ 'num','fileNum','soldier','issuer' ];
        const basicFilled = required.every(id => document.getElementById(id).value.trim() !== '');
        const chargeSelected = el.chargeSelect.value.trim() !== '';
        const verdictFilled = el.verdict.value.trim() !== '';
        if (isManualCharge()) {
          return basicFilled && el.manualCharge.value.trim() !== '' && el.manualVerdict.value.trim() !== '';
        }
        return basicFilled && chargeSelected && verdictFilled;
      }

      function updateState() {
        calculateVerdict();
        const ready = isReady();
        copyBtn.disabled = !ready;
        document.getElementById('formStatus').textContent = ready ? 'مكتمل' : 'غير مكتمل';
        document.getElementById('fieldsCount').textContent = ['num','fileNum','soldier','issuer','rank','chargeSelect','verdict'].filter(id => document.getElementById(id) && document.getElementById(id).value.trim() !== '').length;
        if (ready) preview.textContent = buildText();
      }

      // event bindings
      el.rank.addEventListener('input', updateState);
      el.issuer.addEventListener('change', updateState);
      el.gradeFilter.addEventListener('change', () => { renderCharges(); updateState(); });
      el.chargeSelect.addEventListener('change', updateState);
      el.manualCharge.addEventListener('input', updateState);
      el.manualVerdict.addEventListener('input', updateState);

      ['num','fileNum','soldier'].forEach(id => document.getElementById(id).addEventListener('input', updateState));

      copyBtn.addEventListener('click', async () => {
        const text = buildText();
        preview.textContent = text;
        try { await navigator.clipboard.writeText(text); } catch (e) { const area = document.createElement('textarea'); area.value = text; document.body.appendChild(area); area.select(); document.execCommand('copy'); area.remove(); }
        toast.classList.add('show'); window.setTimeout(() => toast.classList.remove('show'), 1600);
      });

      document.getElementById('courtForm').addEventListener('reset', () => setTimeout(updateState,50));

      fillSelects();
      updateState();
    })();
  </script>
</body>
</html>
